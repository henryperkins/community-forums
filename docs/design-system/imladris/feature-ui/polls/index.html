<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const DS = window.ImladrisDesignSystem_c3e027;
const { Button, Input, Switch, Monogram } = DS;
const fmt = (n) => n.toLocaleString('en-US');

/* ── inline icons (Lucide weight / brand stars) ─────────────── */
const PollGlyph = () => (
  <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
    <rect x="3" y="4.4" width="14" height="3.2" rx="1.6" /><rect x="3" y="10.4" width="18" height="3.2" rx="1.6" /><rect x="3" y="16.4" width="9" height="3.2" rx="1.6" />
  </svg>
);
const stroke = (d, s) => (
  <svg viewBox="0 0 24 24" width={s || 14} height={s || 14} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">{d}</svg>
);
const CheckIcon = ({ s }) => stroke(<path d="M20 6L9 17l-5-5" />, s);
const PlusIcon = () => stroke(<path d="M12 5v14M5 12h14" />);
const XIcon = () => stroke(<path d="M18 6 6 18M6 6l12 12" />);
const ClockIcon = () => stroke(<g><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></g>, 12);
const LockIcon = () => stroke(<g><rect x="4" y="11" width="16" height="9" rx="2" /><path d="M8 11V8a4 4 0 0 1 8 0v3" /></g>, 12);
const Grip = () => (
  <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
    <circle cx="5" cy="4" r="1.3" /><circle cx="11" cy="4" r="1.3" /><circle cx="5" cy="8" r="1.3" /><circle cx="11" cy="8" r="1.3" /><circle cx="5" cy="12" r="1.3" /><circle cx="11" cy="12" r="1.3" />
  </svg>
);
const EightStar = ({ size }) => (
  <svg viewBox="0 0 100 100" width={size} height={size} fill="currentColor" aria-hidden="true">
    <path d="M50 3 63.8 16.7 83.2 16.8 83.3 36.2 97 50 83.3 63.8 83.2 83.2 63.8 83.3 50 97 36.2 83.3 16.8 83.2 16.7 63.8 3 50 16.7 36.2 16.8 16.8 36.2 16.7Z" />
  </svg>
);
const CommendStar = ({ size }) => (
  <svg viewBox="0 0 100 100" width={size || 13} height={size || 13} fill="currentColor" aria-hidden="true">
    <path d="M50 16 58.5 41.5 84 50 58.5 58.5 50 84 41.5 58.5 16 50 41.5 41.5Z" />
  </svg>
);

const SEED = [
  { id: 'tags', label: 'Tagging overhaul', votes: 81 },
  { id: 'feeds', label: 'Saved feeds', votes: 39 },
  { id: 'group', label: 'Group counsel', votes: 21 },
];

/* ── the poll (vote → results, single/multiple, open/closed) ── */
function Poll({ options, multiple, resultsBeforeVote, closed, timeLeft }) {
  const empty = multiple ? [] : null;
  const [selection, setSelection] = useState(empty);
  const [castFor, setCastFor] = useState(empty);
  const [view, setView] = useState(closed ? 'results' : 'vote');
  const [revealed, setRevealed] = useState(!!closed);

  useEffect(() => {
    if (view === 'results') { const t = setTimeout(() => setRevealed(true), 40); return () => clearTimeout(t); }
  }, [view]);

  const hasCast = multiple ? castFor.length > 0 : castFor != null;
  const hasSel = multiple ? selection.length > 0 : selection != null;
  const isSel = (id) => multiple ? selection.includes(id) : selection === id;
  const inCast = (id) => multiple ? castFor.includes(id) : castFor === id;

  const tally = options.map((o) => ({ ...o, votes: o.votes + (hasCast && inCast(o.id) ? 1 : 0) }));
  const total = tally.reduce((s, o) => s + o.votes, 0);
  const pct = (v) => total ? Math.round((v / total) * 100) : 0;

  const toggle = (id) => {
    if (multiple) setSelection((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
    else setSelection(id);
  };
  const cast = () => { setCastFor(selection); setView('results'); };
  const change = () => { setCastFor(empty); setRevealed(false); setView('vote'); };
  const peek = () => setView('results');
  const back = () => { setRevealed(false); setView('vote'); };

  return (
    <div className="poll">
      <div className="poll-head">
        <span className="poll-icon"><PollGlyph /></span>
        <span className="poll-head-text">
          <span className="poll-eyebrow">Poll</span>
          <span className="poll-sub">{multiple ? 'Choose any' : 'Choose one'}</span>
        </span>
        <span className={'poll-status' + (closed ? ' is-closed' : '')}>
          {closed ? <LockIcon /> : <ClockIcon />}{closed ? 'Closed' : timeLeft}
        </span>
      </div>
      <p className="poll-question">Which proposal should the council advance first?</p>

      {view === 'vote' ? (
        <div className="poll-opts">
          {options.map((o) => (
            <button key={o.id} type="button" className={'poll-opt' + (isSel(o.id) ? ' is-selected' : '')} onClick={() => toggle(o.id)} aria-pressed={isSel(o.id)}>
              <span className={'poll-mark ' + (multiple ? 'check' : 'radio')}>
                {isSel(o.id) ? (multiple ? <CheckIcon s={12} /> : <span className="poll-dot" />) : null}
              </span>
              {o.label}
            </button>
          ))}
        </div>
      ) : (
        <div className="poll-opts">
          {tally.map((o) => {
            const mine = hasCast && inCast(o.id);
            return (
              <div key={o.id} className={'poll-result' + (mine ? ' is-mine' : '')}>
                <div className="poll-result-fill" style={{ width: (revealed ? pct(o.votes) : 0) + '%' }} />
                <div className="poll-result-row">
                  <span className="poll-result-label">
                    {mine ? <span className="poll-result-star"><CommendStar /></span> : null}
                    {o.label}
                    {mine ? <span className="poll-result-mine-tag">Your vote</span> : null}
                  </span>
                  <span className="poll-result-val">
                    <span className="poll-result-pct">{pct(o.votes)}%</span>
                    <span className="poll-result-cnt">{fmt(o.votes)}</span>
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="poll-foot">
        <span className="poll-meta">
          {hasCast ? <span className="leaf"><CheckIcon s={13} /></span> : null}
          {closed ? 'Closed' : hasCast ? 'You voted' : view === 'results' ? 'Not yet voted' : 'Open to the council'}
          {' · '}{fmt(total)} votes{closed ? ' · final' : ''}
        </span>
        <div className="poll-actions">
          {view === 'vote' && !closed && (
            <Button variant="primary" size="sm" disabled={!hasSel} onClick={cast}>Vote</Button>
          )}
          {view === 'vote' && !closed && resultsBeforeVote && (
            <Button variant="ghost" size="sm" onClick={peek}>Show results</Button>
          )}
          {view === 'results' && !closed && hasCast && (
            <Button variant="ghost" size="sm" onClick={change}>Change vote</Button>
          )}
          {view === 'results' && !closed && !hasCast && (
            <Button variant="ghost" size="sm" onClick={back}>Cast your vote</Button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Section A: the poll inside a topic ─────────────────────── */
function InTopic() {
  const [multiple, setMultiple] = useState(false);
  const [resultsBefore, setResultsBefore] = useState(true);
  return (
    <div>
      <div className="demo-controls">
        <span className="demo-controls-label">Selection</span>
        <div className="segmented">
          <button className={!multiple ? 'is-on' : ''} onClick={() => setMultiple(false)}>Single</button>
          <button className={multiple ? 'is-on' : ''} onClick={() => setMultiple(true)}>Multiple</button>
        </div>
        <span className="demo-controls-label" style={{ marginLeft: 'auto' }}>Results before voting</span>
        <div className="segmented">
          <button className={resultsBefore ? 'is-on' : ''} onClick={() => setResultsBefore(true)}>On</button>
          <button className={!resultsBefore ? 'is-on' : ''} onClick={() => setResultsBefore(false)}>Off</button>
        </div>
      </div>

      <div className="topic">
        <div className="topic-crumb">Inbox / #vilya-expose</div>
        <h3 className="topic-title">Which proposal should the council advance first?</h3>
        <hr className="topic-hr" />
        <div className="op">
          <Monogram name="Elrond Halfelven" username="elrond" size="lg" gilt presence="online" />
          <div className="op-main">
            <div className="op-byline">
              <a href="#" className="op-name" onClick={(e) => e.preventDefault()}>Elrond Halfelven</a>
              <span className="op-badge">OP</span>
              <span className="op-time">opened · 2 days ago</span>
            </div>
            <div className="op-body">
              <p>We have counsel enough on three fronts and hands for one. Cast your vote so the work resolves into an artifact, not another thread.</p>
              <Poll key={(multiple ? 'm' : 's') + (resultsBefore ? '1' : '0')} options={SEED} multiple={multiple} resultsBeforeVote={resultsBefore} timeLeft="3 days left" />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Section B: a closed poll, resolved ─────────────────────── */
function Closed() {
  return (
    <div className="topic" style={{ boxShadow: 'none' }}>
      <div className="op" style={{ paddingTop: 22 }}>
        <Monogram name="Elrond Halfelven" username="elrond" size="lg" gilt presence="away" />
        <div className="op-main">
          <div className="op-byline">
            <a href="#" className="op-name" onClick={(e) => e.preventDefault()}>Elrond Halfelven</a>
            <span className="op-badge">OP</span>
            <span className="op-time">opened · last moon</span>
          </div>
          <div className="op-body">
            <Poll options={SEED} closed />
            <div className="poll-resolution">
              <CheckIcon s={16} />
              <p>The council advanced <b>Tagging overhaul</b>. This poll is closed; its tally stands as the record.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Section C: the builder ─────────────────────────────────── */
function Builder() {
  const [q, setQ] = useState('Which proposal should the council advance first?');
  const [opts, setOpts] = useState([
    { id: 1, label: 'Tagging overhaul' },
    { id: 2, label: 'Saved feeds' },
    { id: 3, label: 'Group counsel' },
  ]);
  const [multiple, setMultiple] = useState(false);
  const [closes, setCloses] = useState('3d');
  const [resultsBefore, setResultsBefore] = useState(true);
  const [allowChange, setAllowChange] = useState(true);
  const nextId = useState({ v: 4 })[0];

  const setLabel = (id, label) => setOpts((o) => o.map((x) => x.id === id ? { ...x, label } : x));
  const remove = (id) => setOpts((o) => o.length > 2 ? o.filter((x) => x.id !== id) : o);
  const add = () => setOpts((o) => [...o, { id: nextId.v++, label: '' }]);
  const filled = opts.filter((o) => o.label.trim()).length;

  return (
    <div className="builder">
      <div className="builder-head">
        <span className="poll-icon"><PollGlyph /></span>
        <span className="poll-eyebrow">Add a poll</span>
        <span className="builder-hint">A topic may hold one poll.</span>
      </div>

      <label className="field-label">Question</label>
      <Input value={q} onChange={(e) => setQ(e.target.value)} placeholder="What should the council decide?" />

      <label className="field-label">Options</label>
      <div className="opt-list">
        {opts.map((o) => (
          <div className="opt-edit" key={o.id}>
            <span className="opt-grip" title="Drag to reorder"><Grip /></span>
            <Input value={o.label} onChange={(e) => setLabel(o.id, e.target.value)} placeholder="Add an option" />
            <button type="button" className="opt-remove" disabled={opts.length <= 2} onClick={() => remove(o.id)} aria-label="Remove option"><XIcon /></button>
          </div>
        ))}
        <button type="button" className="opt-add" onClick={add}><PlusIcon /> Add option</button>
      </div>

      <div className="builder-settings">
        <div className="setting">
          <span className="setting-label">Selection</span>
          <div className="segmented">
            <button className={!multiple ? 'is-on' : ''} onClick={() => setMultiple(false)}>Single</button>
            <button className={multiple ? 'is-on' : ''} onClick={() => setMultiple(true)}>Multiple</button>
          </div>
        </div>
        <div className="setting">
          <span className="setting-label">Closes</span>
          <select className="builder-select" value={closes} onChange={(e) => setCloses(e.target.value)}>
            <option value="never">Never — open until closed by hand</option>
            <option value="1d">In 1 day</option>
            <option value="3d">In 3 days</option>
            <option value="1w">In 1 week</option>
          </select>
        </div>
        <div className="builder-toggles">
          <Switch label="Show results before voting" checked={resultsBefore} onChange={(e) => setResultsBefore(e.target.checked)} />
          <Switch label="Let voters change their vote" checked={allowChange} onChange={(e) => setAllowChange(e.target.checked)} />
        </div>
      </div>

      <div className="builder-foot">
        <span className="builder-foot-note">{filled} options · {multiple ? 'choose any' : 'choose one'}</span>
        <div className="poll-actions">
          <Button variant="ghost" size="sm">Cancel</Button>
          <Button variant="primary" size="sm" disabled={filled < 2 || !q.trim()}>Add poll to topic</Button>
        </div>
      </div>
    </div>
  );
}

/* ── Page ───────────────────────────────────────────────────── */
function Page() {
  const [theme, setTheme] = useState('light');
  useEffect(() => {
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
  }, [theme]);

  return (
    <div>
      <div className="fa-topbar">
        <span className="fa-star"><EightStar size={22} /></span>
        <span className="fa-brand">RetroBoards</span>
        <span className="fa-sep" />
        <span className="fa-eyebrow">Feature activation</span>
        <span className="fa-flag">flag: polls</span>
        <span className="fa-spacer" />
        <div className="segmented">
          <button className={theme === 'light' ? 'is-on' : ''} onClick={() => setTheme('light')}>Parchment</button>
          <button className={theme === 'dark' ? 'is-on' : ''} onClick={() => setTheme('dark')}>Twilight</button>
        </div>
      </div>

      <div className="fa-doc">
        <div className="fa-lede">
          <span className="fa-lede-star"><EightStar size={150} /></span>
          <p className="fa-lede-eyebrow">Ready to flip · needs a surface</p>
          <h1 className="fa-lede-title">Polls</h1>
          <p className="fa-lede-body">The mechanism is built and tested — one poll per topic, server-counted, CSP-safe. What's missing is the <b>surface</b>: today the composer only inserts a raw <span style={{ fontFamily: 'var(--font-mono), monospace', fontSize: '.92em' }}>Poll: Question?</span> text outline, and there is no rendered, votable poll. Here is the Imladris design for both — a poll that lives in a topic, and the builder that makes one.</p>
        </div>

        <section className="spec">
          <span className="spec-num">01</span> <span className="spec-label">Casting a vote</span>
          <h2 className="spec-title">A poll, inside a topic</h2>
          <p className="spec-note">The poll renders as a block in the opening post. Pick an option and cast your vote — the options resolve into gold-and-evergreen meters, your own choice marked with the commend star. Flip selection mode and the results-before-voting rule below.</p>
          <div className="spec-frame"><InTopic /></div>
        </section>

        <section className="spec">
          <span className="spec-num">02</span> <span className="spec-label">When it closes</span>
          <h2 className="spec-title">The tally stands as the record</h2>
          <p className="spec-note">A closed poll shows its final meters and locks. The outcome resolves into an artifact — stated plainly beneath, in the decision register.</p>
          <div className="spec-frame"><Closed /></div>
        </section>

        <section className="spec">
          <span className="spec-num">03</span> <span className="spec-label">Composing</span>
          <h2 className="spec-title">Building a poll</h2>
          <p className="spec-note">This replaces the text outline. A question, two or more options you can add, reorder, and remove, and the settings the backend already supports — selection mode, a closing time, whether results show before voting, and whether voters may change their mind.</p>
          <div className="spec-frame"><Builder /></div>
        </section>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
