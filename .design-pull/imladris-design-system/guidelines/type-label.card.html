<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-raised); display: flex; flex-direction: column; gap: 14px; }
  .eyebrow { font-family: var(--font-label); text-transform: uppercase; letter-spacing: .16em; font-size: 13px; color: var(--gold-ink); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lbl-btn { font-family: var(--font-label); letter-spacing: .03em; font-size: 15px; color: var(--brand); }
  .caps { font-family: var(--font-label); text-transform: uppercase; letter-spacing: .12em; font-size: 13px; color: var(--ink-700); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <span class="eyebrow">For You · The Hall of Fire</span>
  <div class="row">
    <span class="lbl-btn">New topic</span>
    <span class="caps">Marks of Esteem</span>
    <span class="caps">Commends Earned</span>
  </div>
  <span class="meta">Marcellus · single weight · UPPERCASE, generous tracking</span>
</body>
</html>
