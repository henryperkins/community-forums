<!-- @dsCard group="Colors" viewport="700x170" name="Status ledger" subtitle="Carried by colour AND a word — never colour alone" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; gap: 7px; }
  .wash { border-radius: 8px; padding: 9px 10px; display: flex; align-items: center; justify-content: center; min-height: 42px; font-family: var(--font-label); text-transform: uppercase; letter-spacing: .1em; font-size: 10px; border: 1px solid; }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); line-height: 1.3; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="wash" style="background:var(--surface-done);color:var(--on-done);border-color:var(--green-200)">Solved</div><span class="lbl">leaf · green-050</span></div>
    <div class="cell"><div class="wash" style="background:var(--surface-review);color:var(--on-review);border-color:var(--gold-200)">Needs answer</div><span class="lbl">amber · gold-100</span></div>
    <div class="cell"><div class="wash" style="background:var(--brand-subtle);color:var(--green-800);border-color:var(--green-200)">Decision</div><span class="lbl">green · brand-subtle</span></div>
    <div class="cell"><div class="wash" style="background:var(--surface-info);color:var(--on-info);border-color:var(--river-200)">Info</div><span class="lbl">river · river-100</span></div>
    <div class="cell"><div class="wash" style="background:transparent;color:var(--rust);border-color:var(--rust);border-style:dashed">Danger</div><span class="lbl">rust · #9C4A33</span></div>
  </div>
</body>
</html>
