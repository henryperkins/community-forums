<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="Quiet, even rhythm — 4 / 8 / 12 / 16 / 24 / 32 / 48px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--surface-raised); display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { height: 14px; background: var(--green-200); border-radius: 3px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .lbl b { color: var(--text); }
</style>
</head>
<body>
  <div class="row"><div class="bar" style="width:4px"></div><span class="lbl"><b>--space-1</b> · 4px</span></div>
  <div class="row"><div class="bar" style="width:8px"></div><span class="lbl"><b>--space-2</b> · 8px</span></div>
  <div class="row"><div class="bar" style="width:12px"></div><span class="lbl"><b>--space-3</b> · 12px</span></div>
  <div class="row"><div class="bar" style="width:16px"></div><span class="lbl"><b>--space-4</b> · 16px</span></div>
  <div class="row"><div class="bar" style="width:24px"></div><span class="lbl"><b>--space-5</b> · 24px</span></div>
  <div class="row"><div class="bar" style="width:32px"></div><span class="lbl"><b>--space-6</b> · 32px</span></div>
  <div class="row"><div class="bar" style="width:48px"></div><span class="lbl"><b>--space-8</b> · 48px</span></div>
</body>
</html>
