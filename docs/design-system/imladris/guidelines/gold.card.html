<!-- @dsCard group="Colors" viewport="700x150" name="Mallorn gold — the single accent" subtitle="Indicators: active, unread, esteem, the gilt ring. Used sparingly." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .swatches { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 66px; border-radius: 8px; border: 1px solid rgba(27,35,29,.08); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); line-height: 1.3; }
  .lbl b { display: block; color: var(--text); font-family: var(--font-label); letter-spacing: .03em; font-size: 9.5px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--gold-700)"></div><span class="lbl"><b>700 · ink</b>#9A7530</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-600)"></div><span class="lbl"><b>600 · star</b>#B08A3A</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><span class="lbl"><b>500 · accent</b>#C29A44</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><span class="lbl"><b>400</b>#D2B062</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><span class="lbl"><b>200</b>#EAD9A8</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-100)"></div><span class="lbl"><b>100 · soft</b>#F4EBCF</span></div>
  </div>
</body>
</html>
