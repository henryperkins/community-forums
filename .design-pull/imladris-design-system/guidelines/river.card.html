<!-- @dsCard group="Colors" viewport="700x150" name="Bruinen river — info" subtitle="The cool counterpoint: information, artifact links, avatar tints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .swatches { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 66px; border-radius: 8px; border: 1px solid rgba(27,35,29,.08); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); line-height: 1.3; }
  .lbl b { display: block; color: var(--text); font-family: var(--font-label); letter-spacing: .03em; font-size: 9.5px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--river-900)"></div><span class="lbl"><b>900</b>#1E3040</span></div>
    <div class="sw"><div class="chip" style="background:var(--river-700)"></div><span class="lbl"><b>700</b>#2C4D63</span></div>
    <div class="sw"><div class="chip" style="background:var(--river-500)"></div><span class="lbl"><b>500 · info</b>#3F6E89</span></div>
    <div class="sw"><div class="chip" style="background:var(--river-400)"></div><span class="lbl"><b>400</b>#5E8CA6</span></div>
    <div class="sw"><div class="chip" style="background:var(--river-200)"></div><span class="lbl"><b>200</b>#BAD2DF</span></div>
    <div class="sw"><div class="chip" style="background:var(--river-100)"></div><span class="lbl"><b>100</b>#DCE9F0</span></div>
  </div>
</body>
</html>
