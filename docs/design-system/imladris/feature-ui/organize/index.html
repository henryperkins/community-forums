<!-- @dsCard group="Feature activation" viewport="980x760" name="Organizing the rail" subtitle="board_folders · saved_feeds · bookmark_folders — three rail features that share one surface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Organizing the rail — feature design · RetroBoards</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); color: var(--text-strong); font-family: var(--font-body), Georgia, serif; }

  /* ── Top bar ─────────────────────────────────────────────── */
  .fa-topbar { position: sticky; top: 0; z-index: 6; display: flex; align-items: center; gap: 14px; padding: 12px clamp(18px, 5vw, 48px); background: color-mix(in srgb, var(--surface-raised) 90%, transparent); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-hair); }
  .fa-star { color: var(--brand); flex: none; }
  .fa-brand { font-family: var(--font-display), serif; font-weight: 600; font-size: 19px; color: var(--text-strong); }
  .fa-sep { width: 1px; height: 22px; background: var(--border-hair); }
  .fa-eyebrow { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .14em; font-size: 11px; color: var(--gold-ink); }
  .fa-flags { display: flex; gap: 6px; flex-wrap: wrap; }
  .fa-flag { font-family: var(--font-mono), monospace; font-size: 11.5px; color: var(--on-done); background: var(--surface-done); border: 1px solid var(--green-200); border-radius: var(--radius-pill); padding: 3px 10px; }
  .fa-spacer { flex: 1; }

  /* ── Document column ─────────────────────────────────────── */
  .fa-doc { max-width: 880px; margin: 0 auto; padding: 40px clamp(18px, 5vw, 48px) 96px; }
  .fa-lede { position: relative; }
  .fa-lede-star { position: absolute; right: -10px; top: -34px; color: var(--gold-500); opacity: .08; pointer-events: none; }
  @media (max-width: 560px) { .fa-lede-star { display: none; } }
  .fa-lede-eyebrow { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .16em; font-size: 12px; color: var(--gold-ink); margin: 0 0 8px; }
  .fa-lede-title { font-family: var(--font-display), serif; font-weight: 500; font-size: clamp(34px, 5vw, 46px); line-height: 1.06; letter-spacing: -.01em; margin: 0 0 14px; color: var(--text-strong); }
  .fa-lede-body { font-family: var(--font-body), serif; font-size: 18px; line-height: 1.6; color: var(--text-body); max-width: 62ch; margin: 0; }
  .fa-lede-body b { font-weight: 600; color: var(--text-strong); }
  .mono { font-family: var(--font-mono), monospace; font-size: .92em; }

  /* ── Spec sections ───────────────────────────────────────── */
  .spec { margin-top: 56px; }
  .spec-num { font-family: var(--font-mono), monospace; font-size: 12px; color: var(--gold-ink); }
  .spec-label { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .14em; font-size: 12.5px; color: var(--gold-ink); }
  .spec-flag { font-family: var(--font-mono), monospace; font-size: 11px; color: var(--text-muted); margin-left: 8px; }
  .spec-title { font-family: var(--font-display), serif; font-weight: 500; font-size: 27px; line-height: 1.1; margin: 5px 0 7px; color: var(--text-strong); }
  .spec-note { font-family: var(--font-body), serif; font-size: 16.5px; line-height: 1.55; color: var(--text-body); max-width: 64ch; margin: 0; }
  .spec-frame { margin-top: 20px; }

  /* ── Demo controls + segmented ───────────────────────────── */
  .demo-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 16px; margin-bottom: 16px; padding: 10px 14px; background: var(--surface-sunken); border: 1px solid var(--border-hair); border-radius: var(--radius-lg); }
  .demo-controls-label { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 11px; color: var(--text-muted); }
  .segmented { display: inline-flex; background: var(--surface-raised); border: 1px solid var(--border-hair); border-radius: var(--radius-pill); padding: 3px; }
  .segmented button { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .08em; font-size: 11px; padding: 6px 14px; border-radius: var(--radius-pill); border: none; background: transparent; color: var(--text-muted); cursor: pointer; transition: background var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm); }
  .segmented button:hover { color: var(--text-strong); }
  .segmented button.is-on { background: var(--brand); color: var(--accent-contrast); }

  /* ── Mini app shell (rail + dimmed canvas) ───────────────── */
  .shell { display: grid; grid-template-columns: 256px 1fr; border: 1px solid var(--border-hair); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-raised); box-shadow: var(--shadow-sm); min-height: 420px; }
  .rail { background: var(--surface-sunken); border-right: 1px solid var(--border-hair); padding: 14px 11px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .rail-head { display: flex; align-items: center; justify-content: space-between; padding: 2px 8px 10px; }
  .rail-head-title { font-family: var(--font-display), serif; font-weight: 600; font-size: 15px; color: var(--text-strong); }
  .rail-organize { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .08em; font-size: 10px; color: var(--text-muted); background: transparent; border: 1px solid var(--border-hair); border-radius: var(--radius-pill); padding: 4px 10px; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm), border-color var(--dur-fast) var(--ease-calm); }
  .rail-organize:hover { color: var(--text-strong); border-color: var(--border-strong); }
  .rail-organize.is-on { background: var(--brand); color: var(--accent-contrast); border-color: var(--brand); }

  /* section label */
  .rail-section-label { display: flex; align-items: center; gap: 6px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 10.5px; color: var(--gold-ink); padding: 0 8px 5px; }
  .rail-section-label .leaf { color: var(--gold-500); display: inline-flex; }

  /* folders */
  .folder { border-radius: var(--radius-sm); }
  .folder-head { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left; padding: 6px 8px; border: none; background: transparent; cursor: pointer; border-radius: var(--radius-sm); color: var(--gold-ink); transition: background var(--dur-fast) var(--ease-calm); }
  .folder-head:hover { background: var(--surface-page); }
  .folder-chev { flex: none; transition: transform var(--dur-base) var(--ease-calm); color: var(--text-faint); display: inline-flex; }
  .folder.is-collapsed .folder-chev { transform: rotate(-90deg); }
  .folder-name { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 10.5px; flex: 1; min-width: 0; }
  .folder-name input { font: inherit; letter-spacing: inherit; text-transform: inherit; color: var(--text-strong); background: var(--surface-raised); border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 2px 6px; width: 100%; }
  .folder-count { font-family: var(--font-mono), monospace; font-size: 10px; color: var(--text-faint); }
  .folder-grip { color: var(--border-strong); cursor: grab; display: inline-flex; }
  .folder-body { display: grid; grid-template-rows: 1fr; transition: grid-template-rows var(--dur-base) var(--ease-calm); }
  .folder.is-collapsed .folder-body { grid-template-rows: 0fr; }
  .folder-body-inner { overflow: hidden; }
  .nav-boards { list-style: none; margin: 0 0 6px; padding: 0; }
  .nav-boards li { display: block; }
  .board-btn { display: flex; align-items: center; gap: 8px; padding: 6px 11px; border-radius: var(--radius-sm); color: var(--text-body); width: 100%; text-align: left; background: none; border: 0; cursor: pointer; font-family: var(--font-body), serif; font-size: 14.5px; transition: background var(--dur-fast) var(--ease-calm); }
  .board-btn:hover { background: var(--surface-page); }
  .board-btn.active { background: var(--brand-subtle); box-shadow: inset 3px 0 0 var(--accent-2); color: var(--on-brand-subtle); font-weight: 600; }
  .board-btn .hash { width: 11px; text-align: center; color: var(--text-faint); }
  .board-btn.active .hash { color: var(--brand); }
  .board-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-count { font-family: var(--font-mono), monospace; font-size: 11px; color: var(--text-faint); }
  .board-grip { color: var(--border-strong); cursor: grab; display: inline-flex; flex: none; }

  .rail-add { display: inline-flex; align-items: center; gap: 7px; align-self: flex-start; margin: 4px 8px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .07em; font-size: 10px; color: var(--brand); background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm), border-color var(--dur-fast) var(--ease-calm); }
  .rail-add:hover { background: var(--brand-subtle); border-color: var(--green-200); }
  .rail-divider { height: 1px; background: var(--border-hair); margin: 12px 6px; }

  /* feeds */
  .feed-btn { display: flex; align-items: center; gap: 9px; padding: 6px 11px; border-radius: var(--radius-sm); color: var(--text-body); width: 100%; text-align: left; background: none; border: 0; cursor: pointer; font-family: var(--font-body), serif; font-size: 14.5px; transition: background var(--dur-fast) var(--ease-calm); }
  .feed-btn:hover { background: var(--surface-page); }
  .feed-btn.active { background: var(--brand-subtle); box-shadow: inset 3px 0 0 var(--accent-2); color: var(--on-brand-subtle); font-weight: 600; }
  .feed-dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }
  .feed-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .feed-count { font-family: var(--font-mono), monospace; font-size: 11px; color: var(--text-faint); }
  .feed-new { animation: feedIn var(--dur-slow) var(--ease-calm); }
  @keyframes feedIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }

  /* dimmed canvas */
  .shell-canvas { background: var(--surface-page); padding: 22px 24px; position: relative; min-width: 0; }
  .canvas-filterbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid var(--border-hair); margin-bottom: 18px; }
  .filter-chip { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body), serif; font-size: 13px; color: var(--text-body); background: var(--surface-raised); border: 1px solid var(--border-hair); border-radius: var(--radius-pill); padding: 5px 12px; }
  .filter-chip .x { color: var(--text-faint); cursor: pointer; display: inline-flex; }
  .filter-chip .x:hover { color: var(--danger); }
  .filter-label { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 10px; color: var(--text-faint); }
  .canvas-skeleton { display: flex; flex-direction: column; gap: 16px; opacity: .5; }
  .sk-row { display: flex; gap: 12px; align-items: flex-start; }
  .sk-av { width: 34px; height: 34px; border-radius: 50%; background: var(--surface-sunken); flex: none; }
  .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .sk-line { height: 9px; border-radius: 4px; background: var(--surface-sunken); }

  /* save-feed popover */
  .savefeed { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 12px 14px; background: var(--surface-raised); border: 1px solid var(--gold-300); border-radius: var(--radius-md); box-shadow: var(--gilt); margin-top: 14px; }
  .savefeed-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--gold-soft); color: var(--gold-ink); display: grid; place-items: center; flex: none; }
  .savefeed-fields { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 220px; flex-wrap: wrap; }
  .savefeed-color { display: inline-flex; gap: 6px; }
  .swatch { width: 22px; height: 22px; border-radius: var(--radius-sm); border: 2px solid transparent; cursor: pointer; padding: 0; }
  .swatch.is-on { border-color: var(--text-strong); }

  /* ── Bookmarks panel ─────────────────────────────────────── */
  .bm { border: 1px solid var(--border-hair); border-radius: var(--radius-lg); background: var(--surface-raised); box-shadow: var(--shadow-sm); overflow: hidden; }
  .bm-head { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border-hair); flex-wrap: wrap; }
  .bm-head-title { font-family: var(--font-display), serif; font-weight: 500; font-size: 20px; color: var(--text-strong); display: inline-flex; align-items: center; gap: 9px; }
  .bm-head-title .star { color: var(--star); display: inline-flex; }
  .bm-count { font-family: var(--font-mono), monospace; font-size: 12px; color: var(--text-muted); }
  .bm-folders { display: flex; gap: 8px; flex-wrap: wrap; padding: 14px 20px; border-bottom: 1px solid var(--border-hair); background: var(--surface-sunken); align-items: center; }
  .bm-folder { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .07em; font-size: 11px; color: var(--text-body); background: var(--surface-raised); border: 1px solid var(--border-hair); border-radius: var(--radius-pill); padding: 7px 13px; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm), border-color var(--dur-fast) var(--ease-calm), color var(--dur-fast) var(--ease-calm); }
  .bm-folder:hover { border-color: var(--border-strong); }
  .bm-folder.is-on { background: var(--brand); color: var(--accent-contrast); border-color: var(--brand); }
  .bm-folder .fcount { font-family: var(--font-mono), monospace; font-size: 10px; opacity: .8; }
  .bm-folder-dot { width: 8px; height: 8px; border-radius: 2px; flex: none; }
  .bm-newfolder { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .07em; font-size: 11px; color: var(--brand); background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-pill); padding: 7px 13px; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm); }
  .bm-newfolder:hover { background: var(--brand-subtle); }
  .bm-list { list-style: none; margin: 0; padding: 6px 8px; }
  .bm-row { display: flex; align-items: center; gap: 14px; padding: 13px 12px; border-radius: var(--radius-md); transition: background var(--dur-fast) var(--ease-calm); }
  .bm-row:hover { background: var(--surface-sunken); }
  .bm-row + .bm-row { border-top: 1px solid var(--border-hair); }
  .bm-row-main { flex: 1; min-width: 0; }
  .bm-row-title { font-family: var(--font-display), serif; font-weight: 500; font-size: 16.5px; color: var(--text-strong); margin: 0 0 3px; line-height: 1.25; }
  .bm-row-meta { font-family: var(--font-mono), monospace; font-size: 11.5px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .bm-row-meta .crumb { color: var(--brand); }
  .bm-tag { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .06em; font-size: 10px; color: var(--text-muted); }
  .bm-tag-dot { width: 7px; height: 7px; border-radius: 2px; }
  .bm-move { position: relative; flex: none; }
  .bm-move-btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .06em; font-size: 10px; color: var(--text-muted); background: transparent; border: 1px solid var(--border-hair); border-radius: var(--radius-pill); padding: 6px 11px; cursor: pointer; transition: background var(--dur-fast) var(--ease-calm), border-color var(--dur-fast) var(--ease-calm); }
  .bm-move-btn:hover { border-color: var(--border-strong); color: var(--text-strong); }
  .bm-menu { position: absolute; right: 0; top: calc(100% + 6px); z-index: 5; min-width: 184px; background: var(--surface-raised); border: 1px solid var(--border-hair); border-radius: var(--radius-md); box-shadow: var(--shadow-lg); padding: 6px; }
  .bm-menu-label { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 9.5px; color: var(--text-faint); padding: 6px 10px 4px; }
  .bm-menu-item { display: flex; align-items: center; gap: 9px; width: 100%; text-align: left; padding: 8px 10px; border: none; background: transparent; border-radius: var(--radius-sm); font-family: var(--font-body), serif; font-size: 14px; color: var(--text-body); cursor: pointer; transition: background var(--dur-fast) var(--ease-calm); }
  .bm-menu-item:hover { background: var(--surface-sunken); }
  .bm-menu-item.is-current { color: var(--brand); font-weight: 600; }
  .bm-menu-item .check { margin-left: auto; color: var(--brand); display: inline-flex; }
  .bm-empty { padding: 40px 20px; text-align: center; font-family: var(--font-body), serif; font-style: italic; color: var(--text-muted); }

  @media (max-width: 720px) {
    .shell { grid-template-columns: 1fr; }
    .shell-canvas { display: none; }
  }
</style>
</head>
