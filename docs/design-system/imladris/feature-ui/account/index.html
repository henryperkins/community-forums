  .details-head-title { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .12em; font-size: 11px; color: var(--gold-ink); }
  .details-list { list-style: none; margin: 0; padding: 4px 0; }

  .draft-list { list-style: none; margin: 0; padding: 0; }
  .draft-row { display: flex; align-items: flex-start; gap: 14px; padding: 15px 18px; transition: background var(--dur-fast) var(--ease-calm); }

  /* ── reputation_ledger — how the commends were earned ───── */
  .rl { border: 1px solid var(--border-hair); border-radius: var(--radius-lg); background: var(--surface-raised); box-shadow: var(--shadow-xs); overflow: hidden; }
  .rl-head { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-bottom: 1px solid var(--border-hair); background: var(--surface-sunken); flex-wrap: wrap; }
  .rl-total { display: flex; align-items: baseline; gap: 8px; }
  .rl-total-star { color: var(--star); align-self: center; display: inline-flex; }
  .rl-total-n { font-family: var(--font-display), serif; font-weight: 600; font-size: 27px; color: var(--text-strong); font-variant-numeric: tabular-nums; }
  .rl-total-label { font-family: var(--font-label), serif; text-transform: uppercase; letter-spacing: .1em; font-size: 11px; color: var(--text-muted); }
  .rl-trend { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono), monospace; font-size: 12px; color: var(--on-done); background: var(--surface-done); border: 1px solid var(--green-200); border-radius: var(--radius-pill); padding: 3px 10px; }
  .rl-filter { margin-left: auto; }
  .rl-list { list-style: none; margin: 0; padding: 0; }
  .rl-row { display: flex; align-items: center; gap: 13px; padding: 13px 18px; transition: background var(--dur-fast) var(--ease-calm); }
  .rl-row + .rl-row { border-top: 1px solid var(--border-hair); }
  .rl-row.milestone { background: color-mix(in srgb, var(--gold-soft) 32%, var(--surface-raised)); }

  .rl-med.commend, .rl-med.illuminating { background: var(--gold-soft); color: var(--gold-ink); }
  .rl-med.accepted, .rl-med.decision { background: var(--surface-done); color: var(--success); }
  .rl-med.milestone { background: var(--gold-100); color: var(--gold-600); box-shadow: var(--gilt); }
  .rl-main { min-width: 0; flex: 1; }
  .rl-desc { font-family: var(--font-body), serif; font-size: 15px; color: var(--text-body); line-height: 1.32; }
  .rl-desc b { font-weight: 600; color: var(--text-strong); }
  .rl-sub { font-family: var(--font-mono), monospace; font-size: 11.5px; color: var(--text-muted); margin-top: 2px; display: block; }
  .rl-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex: none; }
  .rl-delta { font-family: var(--font-mono), monospace; font-weight: 600; font-size: 14px; color: var(--success); font-variant-numeric: tabular-nums; }
  .rl-delta.zero { color: var(--text-faint); font-weight: 400; }
  .rl-time { font-family: var(--font-mono), monospace; font-size: 11px; color: var(--text-faint); white-space: nowrap; }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const DS = window.ImladrisDesignSystem_c3e027;
const { Button, Input, Monogram } = DS;
const { Icons, EightStar, CommendStar, Segmented, useTheme, Topbar, Lede, Spec } = window.FA;
const I = (name, s) => Icons[name](s);

/* ════════ 01 · custom_profile_fields ════════ */
const FIELDS = [
  { id: 'pronouns', label: 'Pronouns', type: 'text', value: 'she / her', icon: 'user' },
  { id: 'location', label: 'Location', type: 'text', value: 'Lothlórien', icon: 'pin' },
  { id: 'study', label: 'Field of study', type: 'select', value: 'Interpretability', options: ['Interpretability', 'Evaluations', 'Capability disclosure', 'Audit trails'], icon: 'star' },
  { id: 'home', label: 'Homepage', type: 'url', value: 'galadriel.vale', icon: 'link' },
];
function CustomProfileFields() {
  const [mode, setMode] = useState('show');
  return (
    <div>
      <div className="demo-controls">
        <span className="demo-controls-label">View</span>
        <Segmented value={mode} onChange={setMode} options={[{ value: 'show', label: 'On the profile' }, { value: 'edit', label: 'Editing' }]} />
        <span className="demo-controls-spacer" />
        <span className="demo-hint">{mode === 'show' ? 'How filled fields read' : 'The form a member fills in settings'}</span>
      </div>

      <div className="frame">
        <div className="pane">
          <div className="id-cover">
            <span className="id-cover-star"><EightStar size={150} /></span>
            <Monogram name="Galadriel" username="galadriel" size="xl" gilt presence="online" />
            <div>
              <h3 className="id-name">Galadriel <span className="id-tier">Loremaster</span></h3>
              <p className="id-handle">@galadriel · Lady of the Wood</p>
            </div>
            <div className="id-rep">
              <span className="id-rep-val"><span className="id-rep-star">{I('star', 18)}</span>5,120</span>
              <span className="id-rep-label">Commends</span>
            </div>
          </div>

          {mode === 'show' ? (
            <div className="details">
              <div className="details-head">
                <span style={{ display: 'inline-flex', color: 'var(--gold-ink)' }}>{I('user', 14)}</span>
                <span className="details-head-title">Details</span>
              </div>
              <ul className="details-list">
                {FIELDS.map((f) => (
                  <li className="details-row" key={f.id}>
                    <span className="details-ic">{I(f.icon, 15)}</span>
                    <span className="details-k">{f.label}</span>
                    <span className={'details-v' + (f.type === 'url' ? ' link' : '')}>{f.type === 'url' ? f.value : f.value}</span>
                  </li>
                ))}
              </ul>
            </div>
          ) : (
            <form className="pf-form" onSubmit={(e) => e.preventDefault()}>
              <div className="pf-form-head">
                <p className="pf-form-title">Profile details</p>
                <span className="pf-steward">Fields defined by the stewards</span>
              </div>
              {FIELDS.map((f) => (
                <div className="pf-field" key={f.id}>
                  <div className="pf-label-row">
                    <span className="pf-label">{f.label}</span>
                    <span className="pf-type">{f.type}</span>
                  </div>
                  {f.type === 'select' ? (
                    <select className="acc-select" defaultValue={f.value}>
                      {f.options.map((o) => <option key={o}>{o}</option>)}
                    </select>
                  ) : (
                    <Input defaultValue={f.value} prefix={f.type === 'url' ? 'https://' : undefined} />
                  )}
                  {f.type === 'url' ? <p className="pf-help">Shown as a link on your profile.</p> : null}
                </div>
              ))}
              <div className="pf-form-foot">
                <Button variant="ghost" size="sm">Cancel</Button>
                <Button variant="primary" size="sm">Save details</Button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

/* ════════ 02 · server_drafts ════════ */
const SEED_DRAFTS = [
  { id: 1, to: 'Reply to', title: 'Evaluations as ritual, not gate', board: 'evaluations', snippet: 'The rite framing lands for me. One worry: if every run must resolve into a written verdict, who keeps the verdicts readable a year on?', saved: '2 minutes ago', device: 'this device' },
  { id: 2, to: 'New topic in', title: null, board: 'audit-trails', snippet: 'Proposal: a weekly rollback drill, logged and signed, so the trail proves itself before we need it in anger.', saved: 'yesterday', device: 'on your phone' },
  { id: 3, to: 'Reply to', title: 'Reading attention as a map, not a verdict', board: 'interpretability', snippet: 'Annotating the heatmap so the caveat travels with the image — here is a sketch of how the overlay could read.', saved: '3 days ago', device: 'this device' },
];
function ServerDrafts() {
  const [drafts, setDrafts] = useState(SEED_DRAFTS);
  const [saved, setSaved] = useState(true);
  const tRef = useRef(null);
  const discard = (id) => setDrafts((d) => d.filter((x) => x.id !== id));
  const type = () => {
    setSaved(false);
    clearTimeout(tRef.current);
    tRef.current = setTimeout(() => setSaved(true), 900);
  };
  useEffect(() => () => clearTimeout(tRef.current), []);

  return (
    <div className="frame">
      <div className="pane">
        <div className="drafts">
          <div className="drafts-head">
            <span className="drafts-head-ic">{I('history', 17)}</span>
            <span className="drafts-head-text">
              <span className="drafts-title">Drafts</span>
              <span className="drafts-sync">{I('check', 12)} Saved to your account · syncs across devices</span>
            </span>
            <span className="draft-count" style={{ fontFamily: 'var(--font-mono), monospace', fontSize: 12, color: 'var(--text-muted)' }}>{drafts.length}</span>
          </div>
          {drafts.length === 0 ? (
            <div className="draft-empty">No drafts. Anything you start writing is kept here automatically.</div>
          ) : (
            <ul className="draft-list">
              {drafts.map((d) => (
                <li className="draft-row" key={d.id}>
                  <span className="draft-main">
                    <span className="draft-dest">
                      <span className="to">{d.to}</span>
                      <span className="where">#{d.board}</span>
                    </span>
                    <span className="draft-title">{d.title ? 'Re: ' + d.title : 'Untitled topic'}</span>
                    <span className="draft-snippet">{d.snippet}</span>
                    <span className="draft-foot">
                      <span className="draft-saved">{I('clock', 12)} saved {d.saved}</span>
                      <span className="draft-device">{I('history', 10)} {d.device}</span>
                    </span>
                  </span>
                  <span className="draft-actions">
                    <Button variant="outline" size="sm">Resume</Button>
                    <Button variant="ghost" size="sm" onClick={() => discard(d.id)}>Discard</Button>
                  </span>
                </li>
              ))}
            </ul>
          )}
        </div>

        <div className="as-composer">
          <div className="as-area" contentEditable suppressContentEditableWarning onInput={type}
            style={{ outline: 'none' }}>The rite framing lands for me. One worry: if every run must resolve into a written verdict…</div>
          <div className="as-foot">
            <span className={'as-state' + (saved ? '' : ' saving')}>
              <span className="leaf">{I(saved ? 'check' : 'history', 13)}</span>
              {saved ? 'Draft saved · on your account' : 'Saving…'}
            </span>
            <span className="as-spacer" />
            <Button variant="primary" size="sm">Post reply</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════ 02 · reputation_ledger — how the commends were earned ════════ */
const LEDGER = [
  { id: 1, kind: 'commend', delta: 5, desc: 'Commended on', title: 'Reading attention as a map, not a verdict', sub: 'from Erestor', board: 'interpretability', time: '2h ago' },
  { id: 2, kind: 'accepted', delta: 15, desc: 'Answer accepted on', title: 'Evaluations as ritual, not gate', sub: 'marked by Galadriel', board: 'evaluations', time: 'yesterday' },
  { id: 3, kind: 'illuminating', delta: 2, desc: 'Called illuminating on', title: 'Who changed what — prove the rollback?', sub: 'from Arwen', board: 'audit-trails', time: '2 days ago' },
  { id: 4, kind: 'milestone', delta: 0, desc: 'Reached', title: 'Loremaster', sub: 'crossed 5,000 commends', time: '3 days ago', milestone: true },
  { id: 5, kind: 'decision', delta: 10, desc: 'Credited on the decision', title: 'Adopt written verdicts for eval runs', sub: 'resolved from your proposal', board: 'evaluations', time: '4 days ago' },
  { id: 6, kind: 'commend', delta: 5, desc: 'Commended on', title: 'On exposing capability before we are asked', sub: 'from Glorfindel', board: 'capability-disclosure', time: '5 days ago' },
];
function ReputationLedger() {
  const [filter, setFilter] = useState('all');
  const rows = LEDGER.filter((e) => filter === 'all' ? true : filter === 'commends' ? (e.kind === 'commend' || e.kind === 'illuminating') : e.milestone);
  return (
    <div className="frame">
      <div className="pane">
        <div className="rl">
          <div className="rl-head">
            <span className="rl-total">
              <span className="rl-total-star"><CommendStar size={20} /></span>
              <span className="rl-total-n">5,120</span>
              <span className="rl-total-label">Commends</span>
            </span>
            <span className="rl-trend">{I('escalate', 12)} +37 this week</span>
            <span className="rl-filter">
              <Segmented value={filter} onChange={setFilter}
                options={[{ value: 'all', label: 'All' }, { value: 'commends', label: 'Commends' }, { value: 'milestones', label: 'Milestones' }]} />
            </span>
          </div>
          <ul className="rl-list">
            {rows.map((e) => (
              <li className={'rl-row' + (e.milestone ? ' milestone' : '')} key={e.id}>
                <span className={'rl-med ' + e.kind}>
                  {e.milestone ? <EightStar size={17} /> : (e.kind === 'commend' || e.kind === 'illuminating') ? <CommendStar size={15} /> : I('check', 16)}
                </span>
                <span className="rl-main">
                  <span className="rl-desc">{e.desc} <b>{e.title}</b></span>
                  <span className="rl-sub">{e.sub}{e.board ? ' · #' + e.board : ''}</span>
                </span>
                <span className="rl-right">
                  <span className={'rl-delta' + (e.delta === 0 ? ' zero' : '')}>{e.delta > 0 ? '+' + e.delta : '—'}</span>
                  <span className="rl-time">{e.time}</span>
                </span>
              </li>
            ))}
          </ul>
        </div>
      </div>
    </div>
  );
}

/* ════════ Page ════════ */
function Page() {
  const [theme, setTheme] = useTheme();
  return (
    <div>
      <Topbar eyebrow="Feature activation · account & identity"
        flags={[{ name: 'custom_profile_fields' }, { name: 'reputation_ledger' }, { name: 'server_drafts', blocked: true }]}

      <div className="fa-doc">

        <Spec num="01" label="custom_profile_fields" title="The fields the stewards define"
          note="Stewards define a set of profile fields — a text line, a choice, a link. Members fill them in settings, and they read as a tidy “Details” block on the profile. Toggle between how the filled fields appear and the form a member edits.">

        <Spec num="02" label="reputation_ledger" title="How the commends were earned"

        </div>

    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
