<!-- @dsCard group="Colors" viewport="700x150" name="Evergreen — brand" subtitle="Mallorn boughs; the primary brand colour (links, buttons, OP)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .swatches { display: flex; gap: 8px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 66px; border-radius: 8px; border: 1px solid rgba(27,35,29,.08); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); line-height: 1.3; }
  .lbl b { display: block; color: var(--text); font-family: var(--font-label); letter-spacing: .03em; font-size: 9.5px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--green-900)"></div><span class="lbl"><b>900</b>#1C2E24</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-800)"></div><span class="lbl"><b>800</b>#24402F</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-700)"></div><span class="lbl"><b>700 · brand</b>#2E4A3A</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-600)"></div><span class="lbl"><b>600</b>#3A5C49</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><span class="lbl"><b>500 · leaf</b>#4E7459</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-400)"></div><span class="lbl"><b>400</b>#6E9479</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-200)"></div><span class="lbl"><b>200</b>#BCD0BF</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-100)"></div><span class="lbl"><b>100</b>#DCE8DD</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-050);border-color:rgba(27,35,29,.12)"></div><span class="lbl"><b>050</b>#EDF3ED</span></div>
  </div>
</body>
</html>
