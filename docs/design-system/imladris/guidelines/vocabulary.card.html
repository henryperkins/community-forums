<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-raised); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 32px; }
  .pair { display: flex; align-items: baseline; gap: 10px; padding: 4px 0; border-bottom: 1px solid var(--border-hair); }
  .from { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); min-width: 92px; }
  .arrow { color: var(--gold-ink); }
  .to { font-family: var(--font-display); font-size: 18px; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="grid">
    <div class="pair"><span class="from">reply</span><span class="arrow">→</span><span class="to">counsel</span></div>
    <div class="pair"><span class="from">community</span><span class="arrow">→</span><span class="to">the council</span></div>
    <div class="pair"><span class="from">like</span><span class="arrow">→</span><span class="to">commend</span></div>
    <div class="pair"><span class="from">reputation</span><span class="arrow">→</span><span class="to">regard</span></div>
    <div class="pair"><span class="from">badges</span><span class="arrow">→</span><span class="to">marks of esteem</span></div>
    <div class="pair"><span class="from">leaderboard</span><span class="arrow">→</span><span class="to">top contributors</span></div>
    <div class="pair"><span class="from">tier</span><span class="arrow">→</span><span class="to">Legend · Loremaster</span></div>
    <div class="pair"><span class="from">joined</span><span class="arrow">→</span><span class="to">Third Age, 2021</span></div>
  </div>
</body>
</html>
