<body>
<div id="root"></div>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Monogram, StarButton, Reaction } = window.ImladrisDesignSystem_c3e027;
const ic = (d) => <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'block'}}><path d={d}/></svg>;
const flame = ic("M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z");

function Demo() {
  return (
    <div className="stack">
      <div>
        <div className="cap">Monograms · colour hashed from username</div>
        <div className="group">
          <Monogram name="Erestor" username="erestor" />
          <Monogram name="Galadriel" username="galadriel" />

          <StarButton active />

      </div>
      <div>

          <Reaction name="Commend" count="31" active />
          <Reaction name="Kindled" count="12" icon={flame} />
          <Reaction name="Seconded" count="8" icon={check} />
