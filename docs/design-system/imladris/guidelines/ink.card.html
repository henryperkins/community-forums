<!-- @dsCard group="Colors" viewport="700x150" name="Ink — the text scale" subtitle="Warm near-black to soft grey-green; never pure #000" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-raised); }
  .swatches { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 50px; border-radius: 8px; border: 1px solid rgba(27,35,29,.08); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 20px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); line-height: 1.35; }
  .lbl b { display: block; color: var(--text); font-family: var(--font-label); letter-spacing: .04em; font-size: 10px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--ink-900);color:var(--parchment-50)">Aa</div><span class="lbl"><b>Ink 900</b>#1B231D · primary</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700);color:var(--parchment-50)">Aa</div><span class="lbl"><b>Ink 700</b>#313B33 · body</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500);color:var(--parchment-50)">Aa</div><span class="lbl"><b>Ink 500</b>#515C52 · muted</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400);color:var(--parchment-50)">Aa</div><span class="lbl"><b>Ink 400</b>#5C685D · faint</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300);color:var(--ink-900)">Aa</div><span class="lbl"><b>Ink 300</b>#94A095 · lines</span></div>
  </div>
</body>
</html>
