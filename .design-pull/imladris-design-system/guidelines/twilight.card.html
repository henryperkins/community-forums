<!-- @dsCard group="Colors" viewport="700x150" name="Twilight — the night register" subtitle="Dark surfaces; gold becomes the actionable colour. data-theme=dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--twilight-900); }
  .swatches { display: flex; gap: 10px; align-items: stretch; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 66px; border-radius: 8px; border: 1px solid rgba(236,228,210,.12); }
  .lbl { font-family: var(--font-mono); font-size: 9.5px; color: #AEB8B4; line-height: 1.3; }
  .lbl b { display: block; color: #ECE4D2; font-family: var(--font-label); letter-spacing: .03em; font-size: 9.5px; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--twilight-900)"></div><span class="lbl"><b>900 · page</b>#161D24</span></div>
    <div class="sw"><div class="chip" style="background:var(--twilight-800)"></div><span class="lbl"><b>800 · raised</b>#1E2730</span></div>
    <div class="sw"><div class="chip" style="background:var(--twilight-700)"></div><span class="lbl"><b>700 · sunken</b>#283440</span></div>
    <div class="sw"><div class="chip" style="background:var(--gold-400)"></div><span class="lbl"><b>Gold 400</b>accent on dark</span></div>
    <div class="sw"><div class="chip" style="background:var(--green-500)"></div><span class="lbl"><b>Green 500</b>quiet brand</span></div>
    <div class="sw"><div class="chip" style="background:#ECE4D2"></div><span class="lbl"><b>Parchment</b>the ink</span></div>
  </div>
</body>
</html>
