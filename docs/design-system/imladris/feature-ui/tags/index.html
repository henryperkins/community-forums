  .browse-clear:hover { color: var(--danger); }

<script type="text/babel" data-presets="react">
const { useState, useRef, useMemo } = React;
const DS = window.ImladrisDesignSystem_c3e027;
const { Button, Monogram } = DS;
const { Icons, Segmented, useTheme, Topbar, Lede, Spec, FrameBar } = window.FA;
const I = (name, s) => Icons[name](s);

/* tag catalog — name, topic count, optional featured + gloss */
const CATALOG = [
  { name: 'interpretability', count: 47, featured: true, desc: 'reading model internals' },
  { name: 'evaluations', count: 63, featured: true, desc: 'how we test and grade' },
  { name: 'audit-trails', count: 39, desc: 'who changed what, and proof' },
  { name: 'capability-disclosure', count: 22, desc: 'what to reveal, and when' },
  { name: 'rollback', count: 18 },
  { name: 'red-team', count: 27 },
  { name: 'governance', count: 31 },
  { name: 'tooling', count: 24 },
  { name: 'proposal', count: 15 },
  { name: 'decision', count: 11, featured: true, desc: 'resolved into an artifact' },
  { name: 'onboarding', count: 9 },
  { name: 'retro', count: 7 },
];
const byName = (n) => CATALOG.find((t) => t.name === n) || { name: n, count: 0 };

/* Tag chip */
function TagChip({ name, count, featured, onClick, on, onRemove, className }) {
  const cls = 'tagc' + (featured ? ' featured' : '') + (on ? ' on' : '') + (className ? ' ' + className : '');
  const inner = (
    <>
      <span className="hash">#</span>{name}
      {count != null ? <span className="cnt">{count}</span> : null}
      {onRemove ? <span className="tagc-x" onClick={(e) => { e.stopPropagation(); onRemove(); }} role="button" aria-label={'Remove ' + name}>{I('x', 12)}</span> : null}
    </>
  );
  if (onClick) return <button type="button" className={cls} onClick={onClick} aria-pressed={!!on}>{inner}</button>;
  if (onRemove) return <span className={cls}>{inner}</span>;
  return <a className={cls} href="#" onClick={(e) => e.preventDefault()}>{inner}</a>;
}

/* ════════ 01 · on a topic ════════ */
const TAGGED = [
  { id: 1, title: 'Reading attention as a map, not a verdict', tags: ['interpretability', 'tooling'], replies: 17 },
  { id: 2, title: 'Who changed what — prove the rollback?', tags: ['audit-trails', 'rollback', 'governance'], replies: 41 },
  { id: 3, title: 'Evaluations as ritual, not gate', tags: ['evaluations', 'decision'], replies: 23 },
];
function OnATopic() {
  return (
    <div className="frame">
      <FrameBar route={<span><span className="seg-strong">Inbox</span> / #interpretability / Reading attention as a map</span>} />
      <div className="pane">
        <p className="tt-crumb"># interpretability</p>
        <h3 className="tt-title">Reading attention as a map, not a verdict</h3>
        <div className="tt-metarow">
          <span className="tt-by">
            <Monogram name="Arwen" username="arwen" size="sm" gilt presence="online" />
            <span><span className="tt-by-name">Arwen</span> <span className="tt-by-meta">· opened 1 day ago · 17 replies</span></span>
          </span>
        </div>
        <div className="tag-row">
          {['interpretability', 'tooling'].map((t) => <TagChip key={t} name={t} featured={byName(t).featured} />)}
        </div>
        <div className="tt-divider" />
        <p style={{ fontFamily: 'var(--font-label), serif', textTransform: 'uppercase', letterSpacing: '.1em', fontSize: 11, color: 'var(--text-muted)', margin: '0 0 11px' }}>More in these tags</p>
        <div className="tt-list">
          {TAGGED.map((t) => (
            <div className="tt-item" key={t.id}>
              <span className="tt-item-main">
                <span className="tt-item-title">{t.title}</span>
                <span className="tt-item-tags">{t.tags.map((x) => <TagChip key={x} name={x} featured={byName(x).featured} onClick={() => {}} />)}</span>
              </span>
              <span className="tt-item-count">{t.replies} replies</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ════════ 02 · composer input ════════ */
const MAX_TAGS = 5;
function ComposerTags() {
  const [tags, setTags] = useState(['interpretability', 'tooling']);
  const [text, setText] = useState('');
  const [focus, setFocus] = useState(false);
  const [cursor, setCursor] = useState(0);
  const inputRef = useRef(null);
  const boxRef = useRef(null);
  const full = tags.length >= MAX_TAGS;

  const matches = useMemo(() => {
    const q = text.trim().toLowerCase();
    return CATALOG.filter((t) => !tags.includes(t.name) && (!q || t.name.includes(q)));
  }, [text, tags]);
  const exact = CATALOG.some((t) => t.name === text.trim().toLowerCase());
  const canCreate = text.trim().length >= 2 && !exact && !tags.includes(text.trim().toLowerCase());
  const options = [...matches.map((m) => ({ kind: 'tag', ...m })), ...(canCreate ? [{ kind: 'create', name: text.trim().toLowerCase() }] : [])];

  const add = (name) => { if (!tags.includes(name) && tags.length < MAX_TAGS) setTags((t) => [...t, name]); setText(''); setCursor(0); inputRef.current && inputRef.current.focus(); };
  const remove = (name) => setTags((t) => t.filter((x) => x !== name));
  const onKey = (e) => {
    if (e.key === 'Backspace' && !text && tags.length) { remove(tags[tags.length - 1]); return; }
    if (!options.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); setCursor((c) => (c + 1) % options.length); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setCursor((c) => (c - 1 + options.length) % options.length); }
    else if (e.key === 'Enter') { e.preventDefault(); add(options[Math.min(cursor, options.length - 1)].name); }
  };
  const open = focus && !full && options.length > 0;

  return (
    <div className="fc" onClick={() => inputRef.current && inputRef.current.focus()}>
      <div className="fc-id" onClick={(e) => e.stopPropagation()}>{I('pencil', 14)} New topic in #interpretability</div>
      <input className="fc-titlefield" defaultValue="Annotating heatmaps so the caveat travels" onClick={(e) => e.stopPropagation()} />
      <div className="fc-body" onClick={(e) => e.stopPropagation()}><span className="ph">A sketch of an overlay that keeps the “map, not verdict” caveat attached to the image…</span></div>

      <div className="taginput" onClick={(e) => e.stopPropagation()}>
        <div className="taginput-label">
          <span className="l">Tags</span>
          <span className={'lim' + (full ? ' full' : '')}>{tags.length} / {MAX_TAGS}{full ? ' · limit reached' : ''}</span>
        </div>
        <div ref={boxRef} className={'taginput-box' + (focus ? ' focus' : '')} onClick={() => inputRef.current && inputRef.current.focus()}>
          {tags.map((t) => <TagChip key={t} name={t} className="taginput-chip" onRemove={() => remove(t)} />)}
          {!full && (
            <input ref={inputRef} value={text} placeholder={tags.length ? 'Add another…' : 'Add up to five tags…'}
              onChange={(e) => { setText(e.target.value); setCursor(0); }} onKeyDown={onKey}
              onFocus={() => setFocus(true)} onBlur={() => setTimeout(() => setFocus(false), 150)} />
          )}
        </div>
        {open && (
          <div className="tag-menu">
            <p className="tag-menu-label">{text.trim() ? 'Matching tags' : 'Frequently used'}</p>
            {options.map((o, i) => o.kind === 'create' ? (
              <button key="__create" className={'tag-opt create' + (i === cursor ? ' cursor' : '')} onMouseDown={(e) => { e.preventDefault(); add(o.name); }} onMouseEnter={() => setCursor(i)}>
                <span className="plus">{I('plus', 15)}</span>
                <span className="new">Create <span className="newtag">#{o.name}</span></span>
              </button>
            ) : (
              <button key={o.name} className={'tag-opt' + (i === cursor ? ' cursor' : '')} onMouseDown={(e) => { e.preventDefault(); add(o.name); }} onMouseEnter={() => setCursor(i)}>
                <span className="hash">#</span>
                <span className="tag-opt-name">{o.name}{o.desc ? <span className="tag-opt-desc"> — {o.desc}</span> : null}</span>
                <span className="tag-opt-count">{o.count}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="fc-actions">
        <span className="fc-hint">Type to search · Enter to add · ↑↓ to choose</span>
        <span className="sp" />
        <Button variant="ghost" size="sm">Save draft</Button>
        <Button variant="primary" size="sm">Post topic</Button>
      </div>
    </div>
  );
}

/* ════════ 03 · browse ════════ */
const DIRECTORY_TOPICS = [
  { id: 1, title: 'Reading attention as a map, not a verdict', author: 'Arwen', tags: ['interpretability', 'tooling'], replies: 17 },
  { id: 2, title: 'Who changed what — prove the rollback?', author: 'Erestor', tags: ['audit-trails', 'rollback', 'governance'], replies: 41 },
  { id: 3, title: 'Evaluations as ritual, not gate', author: 'Galadriel', tags: ['evaluations', 'decision'], replies: 23 },
  { id: 4, title: 'A weekly rollback drill, logged and signed', author: 'Elrond', tags: ['audit-trails', 'rollback', 'proposal'], replies: 12 },
  { id: 5, title: 'Red-team notes from the last capability review', author: 'Glorfindel', tags: ['red-team', 'capability-disclosure'], replies: 29 },
  { id: 6, title: 'Onboarding the newest loremasters', author: 'Lindir', tags: ['onboarding', 'governance'], replies: 6 },
];
function Browse() {
  const [sel, setSel] = useState(['audit-trails']);
  const toggle = (name) => setSel((s) => s.includes(name) ? s.filter((x) => x !== name) : [...s, name]);
  const results = sel.length === 0 ? DIRECTORY_TOPICS : DIRECTORY_TOPICS.filter((t) => sel.every((s) => t.tags.includes(s)));
  const sorted = [...CATALOG].sort((a, b) => b.count - a.count);

  return (
    <div className="frame">
      <FrameBar route={<span><span className="seg-strong">Inbox</span> / tags{sel.length ? ' / ' + sel.map((s) => '#' + s).join(' + ') : ''}</span>} />
      <div className="browse">
        <aside className="browse-dir">
          <div className="browse-dir-head">
            <span className="browse-dir-title">All tags</span>
            <span className="browse-dir-sort">by use</span>
          </div>
          <div className="browse-cloud">
            {sorted.map((t) => (
              <TagChip key={t.name} name={t.name} count={t.count} featured={t.featured && !sel.includes(t.name)} on={sel.includes(t.name)} onClick={() => toggle(t.name)} />
            ))}
          </div>
        </aside>
        <div className="browse-results">
          <div className="browse-results-head">
            <h4 className="browse-results-title">{sel.length ? results.length + (results.length === 1 ? ' topic' : ' topics') : 'All topics'}</h4>
            {sel.length ? (
              <>
                <span className="browse-active">
                  {sel.map((s) => <TagChip key={s} name={s} className="taginput-chip" onRemove={() => toggle(s)} />)}
                </span>
                <button className="browse-clear" onClick={() => setSel([])}>Clear</button>
              </>
            ) : null}
          </div>
          {results.length === 0 ? (
            <div className="browse-empty">No topics carry all of these tags together.</div>
          ) : (
            <div className="tt-list">
              {results.map((t) => (
                <div className="tt-item" key={t.id}>
                  <span className="b-mono">{t.author.slice(0, 2).toUpperCase()}</span>
                  <span className="tt-item-main">
                    <span className="tt-item-title">{t.title}</span>
                    <span className="tt-item-tags">
                      {t.tags.map((x) => <TagChip key={x} name={x} on={sel.includes(x)} featured={byName(x).featured && !sel.includes(x)} onClick={() => toggle(x)} />)}
                    </span>
                  </span>
                  <span className="tt-item-count">{t.replies} replies</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
