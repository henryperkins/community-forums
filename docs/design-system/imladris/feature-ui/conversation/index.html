<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;
const DS = window.ImladrisDesignSystem_c3e027;
const { Button, Post, Reaction } = DS;
const { Icons, EightStar, Segmented, useTheme, Topbar, Lede, Spec, FrameBar } = window.FA;
const I = (name, s) => Icons[name](s);

/* ── reusable cards ─────────────────────────────────────────── */
function RefCard() {
  return (
    <a className="ref-card" onClick={(e) => e.preventDefault()} href="#">
      <span className="ref-card-ic">{I('quote', 18)}</span>
      <span className="ref-card-main">
        <span className="ref-card-kicker">{I('hash', 11)} interpretability · referenced</span>
        <span className="ref-card-title">Reading attention as a map, not a verdict</span>
        <span className="ref-card-snippet">“Attention tells you where the model looked, not what it concluded.”</span>
        <span className="ref-card-by">Arwen · 17 replies</span>
      </span>
    </a>
  );
}
function LinkPreview({ onRemove, linky }) {
  return (
    <div className={'lp-card' + (linky ? ' linky' : '')}>
      <div className="lp-thumb">{I('link', 26)}</div>
      <div className="lp-main">
        <div className="lp-source"><span className="lp-favicon">R</span> retroboards.dev · the-charter</div>
        <div className="lp-title">A charter for keeping counsel</div>
        <div className="lp-desc">Status is verified, not asserted. Outcomes resolve into artifacts. Testimony never outranks the work.</div>
      </div>
      {onRemove ? <button className="lp-remove" onClick={onRemove} aria-label="Remove preview">{I('x', 13)}</button> : null}
    </div>
  );
}

/* ════════ 01 · community_memory ════════ */
function CommunityMemory() {
  const [open, setOpen] = useState(true);
  return (
    <div className="frame">
      <FrameBar route={<span><span className="seg-strong">Inbox</span> / #evaluations / Evaluations as ritual, not gate</span>} />
      <div className="reading">
        <div className="reading-wrap">
          <div className="mem">
            <div className="mem-head">
              <span className="mem-ic">{I('history', 17)}</span>
              <span className="mem-headtext">
                <span className="mem-title">Catch me up</span>
                <span className="mem-since">12 new replies since you last read · 2 days ago</span>
              </span>
              <span className="mem-toggle">
                <Button variant="ghost" size="sm" onClick={() => setOpen((o) => !o)}>
                  {open ? 'Hide' : 'Show'} summary
                </Button>
              </span>
            </div>
            <div className={'mem-body ' + (open ? 'open' : 'shut')}>
              <ul className="mem-summary">
                <li><b>Galadriel</b> reframed the eval suite as a rite the council keeps, not a turnstile to pass.</li>
                <li><b>Elrond</b> seconded, drawing the line between “may this pass?” and “what did we learn?”</li>
                <li><span className="ans">Now the answer:</span> <b>Arwen</b> proposed every run resolve into a short written verdict, linked from the topic.</li>
              </ul>
              <div className="mem-foot">
                <span className="mem-related-label">Related</span>
                <div className="mem-chips">
                  <a className="mem-chip" href="#" onClick={(e) => e.preventDefault()}><span className="hash">#</span>reading attention as a map</a>
                  <a className="mem-chip" href="#" onClick={(e) => e.preventDefault()}><span className="hash">#</span>prove the rollback</a>
                </div>
              </div>
            </div>
          </div>

          <div className="post-stream" style={{ marginTop: 16 }}>
            <Post author="Galadriel" handle="galadriel" authorTitle="Lady of the Wood" authorTier="Loremaster" presence="online" time="2 days ago" op rep={5120}
              reactions={<><Reaction name="Commend" count={31} active /><Reaction name="Illuminating" count={9} icon={I('star', 13)} /></>}>
              <p>We keep treating the eval suite as a turnstile — pass and forget. I want to argue it should be a rite: something the whole council performs, reads, and remembers.</p>
            </Post>

            <div className="unread-div"><span><span className="dot" />New since you last read · 12 replies</span></div>

            <Post author="Arwen" handle="arwen" authorTitle="Evenstar" authorTier="Veteran" presence="online" time="22h" accepted rep={1760}
              reactions={<><Reaction name="Commend" count={26} active /><Reaction name="Kindled" count={7} icon={I('star', 13)} /></>}>
              <p>Here is the shape that worked for us: every eval run resolves into an artifact — a short written verdict, linked from the topic. The rite is reading the last three before you open a new one.</p>
            </Post>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════ 02 · content_references ════════ */
const TOPICS = [
  { id: 1, title: 'Reading attention as a map, not a verdict', board: 'interpretability', by: 'Arwen · 17 replies' },
  { id: 2, title: 'Who changed what — prove the rollback?', board: 'audit-trails', by: 'Erestor · 41 replies' },
  { id: 3, title: 'On exposing capability before we are asked', board: 'capability-disclosure', by: 'Elrond · 12 replies' },
  { id: 4, title: 'The hall reopens — read this first', board: 'announcements', by: 'Elrond · 8 replies' },
];
function ContentReferences() {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState('');
  const [inserted, setInserted] = useState(false);
  const matches = TOPICS.filter((t) => (t.title + ' ' + t.board).toLowerCase().includes(q.toLowerCase()));
  const insert = () => { setInserted(true); setOpen(false); setQ(''); };

  return (
    <div>
      <div className="demo-controls">
        <span className="demo-controls-label">As it reads in a post</span>
        <span className="demo-controls-spacer" />
        <span className="demo-hint">Below: build one in the composer</span>
      </div>

      <div className="frame" style={{ marginBottom: 18 }}>
        <div className="reading"><div className="reading-wrap">
          <Post author="Erestor" handle="erestor" authorTitle="Loremaster of Imladris" authorTier="Legend" presence="online" time="1 day ago" rep={3985}
            reactions={<Reaction name="Seconded" count={14} icon={I('check', 13)} />}>
            <p>Arwen's framing settles it for me — and it answers a worry raised earlier in the vale:</p>
            <RefCard />
            <p>The map-versus-verdict distinction is exactly why the written artifact matters. Let's adopt it.</p>
          </Post>
        </div></div>
      </div>

      <div className="fc">
        <div className="fc-id">{I('quote', 14)} Replying to Evaluations as ritual, not gate</div>
        <div className="fc-toolbar">
          <button className="fc-tool">B</button>
          <button className="fc-tool" style={{ fontStyle: 'italic' }}>i</button>
          <span className="fc-tool-sep" />
          <button className={'fc-tool' + (open ? ' on' : '')} onClick={() => setOpen((o) => !o)}>{I('quote', 13)} Reference a post</button>
          <button className="fc-tool">{I('link', 13)} Link</button>
        </div>
        <div className="fc-area">
          {inserted ? (
            <div>
              <span>Arwen's framing settles it — see the thread it answers:</span>
              <RefCard />
            </div>
          ) : (
            <span className="ph">Write your reply, or reference another topic…</span>
          )}
        </div>
        {open && (
          <div className="pick" role="dialog" aria-label="Reference a post">
            <div className="pick-search">
              {I('search', 16)}
              <input autoFocus placeholder="Search topics to reference…" value={q} onChange={(e) => setQ(e.target.value)} />
            </div>
            <div className="pick-list">
              {matches.length ? matches.map((t) => (
                <button className="pick-item" key={t.id} onClick={insert}>
                  <span className="pick-item-title">{t.title}</span>
                  <span className="pick-item-meta">#{t.board} · {t.by}</span>
                </button>
              )) : <div className="pick-empty">No topics match “{q}”.</div>}
            </div>
          </div>
        )}
        <div className="fc-actions">
          {inserted && <Button variant="ghost" size="sm" onClick={() => setInserted(false)}>Clear</Button>}
          <span className="fc-count">{inserted ? 'reference attached' : 'draft'}</span>
        </div>
      </div>
    </div>
  );
}

/* ════════ 03 · link_previews ════════ */
function LinkPreviews() {
  const [state, setState] = useState('empty'); // empty | resolving | resolved
  const paste = () => {
    setState('resolving');
    setTimeout(() => setState('resolved'), 1000);
  };
  useEffect(() => () => {}, []);

  return (
    <div>
      <div className="demo-controls">
        <span className="demo-controls-label">As it reads in a post</span>
        <span className="demo-controls-spacer" />
        <span className="demo-hint">Below: paste a link in the composer</span>
      </div>

      <div className="frame" style={{ marginBottom: 18 }}>
        <div className="reading"><div className="reading-wrap">
          <Post author="Elrond" handle="elrond" authorTitle="Master of the House" authorTier="Legend" presence="online" time="5 days ago" op staff rep={8740}
            reactions={<Reaction name="Commend" count={64} />}>
            <p>Welcome back. The charter we keep counsel by is pinned below — star the topic; we amend it as the council grows.</p>
            <LinkPreview linky />
          </Post>
        </div></div>
      </div>

      <div className="fc">
        <div className="fc-id">{I('link', 14)} New reply</div>
        <div className="fc-area">
          {state === 'empty' && <span className="ph">Paste a link and it resolves into a preview…</span>}
          {state !== 'empty' && <span className="fc-url">https://retroboards.dev/the-charter</span>}
          {state === 'resolving' && (
            <div className="lp-card resolving" aria-hidden="true">
              <div className="lp-thumb" />
              <div className="lp-main" style={{ flex: 1 }}>
                <div className="shim" style={{ width: '40%', marginBottom: 9 }} />
                <div className="shim" style={{ width: '75%', height: 13, marginBottom: 8 }} />
                <div className="shim" style={{ width: '90%' }} />
              </div>
            </div>
          )}
          {state === 'resolved' && <LinkPreview onRemove={() => setState('empty')} />}
        </div>
        <div className="fc-actions">
          {state === 'empty'
            ? <Button variant="outline" size="sm" onClick={paste}>{I('link', 13)}&nbsp; Paste a link</Button>
            : <Button variant="ghost" size="sm" onClick={() => setState('empty')}>Start over</Button>}
          <span className="fc-count">{state === 'resolving' ? 'reading link…' : state === 'resolved' ? 'preview attached' : 'draft'}</span>
        </div>
      </div>
    </div>
  );
}

/* ════════ Page ════════ */
function Page() {
  const [theme, setTheme] = useTheme();
  return (
    <div>
      <Topbar eyebrow="Feature activation · the conversation"
        flags={[{ name: 'community_memory' }, { name: 'content_references' }, { name: 'link_previews', blocked: true }]}
        theme={theme} setTheme={setTheme} />
      <div className="fa-doc">
        <Lede eyebrow="Built · awaiting a surface" title="In the conversation"
          ledger={[
            { flag: 'community_memory', desc: 'catch me up + related' },
            { flag: 'content_references', desc: 'quote another topic' },
            { flag: 'link_previews', desc: 'links as cards' },
          ]}>
          These three live in the reading pane — the place a member spends almost all their time. Each turns something the backend already produces (a since-last-read diff, a cross-reference, a fetched link) into <b>a card you can actually see</b>. Designed in context below, live and clickable.
        </Lede>

        <Spec num="01" label="community_memory" title="Catch me up, then mark what's new"
          note="Return after two days and the council remembers for you: a short summary of what changed, the topics it relates to, and a clear rule across the stream marking everything new since your last visit. Toggle the summary — it stays out of the way once you're caught up.">
          <CommunityMemory />
        </Spec>

        <Spec num="02" label="content_references" title="Quote another topic, in place"
          note="A reference is more than a link — it's a card that carries the other topic's title, a line of its substance, and who wrote it, rendered inline. Open “Reference a post” in the composer, search, and pick; the card attaches to your draft.">
          <ContentReferences />
        </Spec>

        <Spec num="03" label="link_previews" title="Links resolve into cards"
          note="Paste a URL and it unfurls: source, title, description, and room for a thumbnail — instead of a bare blue link. The composer shows the resolve in progress and lets the author drop the preview if they'd rather keep the raw link.">
          <LinkPreviews />
        </Spec>

        <div className="fa-callout">
          <span className="fa-callout-icon">{I('check', 18)}</span>
          <p>All three render inside the existing post and composer — <b>no new routes</b>. link_previews carries a fetch/SSRF surface, so its flip waits on the server-side review; community_memory and content_references need only the browser/a11y capture of these cards.</p>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
