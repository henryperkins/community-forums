<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-inverse); }
  .colophon { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 25px; line-height: 1.38; color: var(--parchment-50); margin: 0; max-width: 30ch; }
  .principles { display: flex; flex-wrap: wrap; gap: 8px 20px; margin-top: 18px; font-family: var(--font-label); text-transform: uppercase; letter-spacing: .08em; font-size: 11px; color: var(--gold-400); }
  .quenya { font-family: var(--font-display); font-style: italic; font-size: 14px; color: var(--gold-400); opacity: .85; margin: 14px 0 0; }
</style>
</head>
<body>
  <p class="colophon">Status is verified, not asserted; outcomes resolve into artifacts; testimony never outranks the work.</p>
  <div class="principles"><span>Warm, not chatty</span><span>Plain, not corporate</span><span>Sentence case</span><span>You, the reader</span></div>
  <p class="quenya">Et Eärello Endorenna utúlien.</p>
</body>
</html>
