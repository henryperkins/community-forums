<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 14px; background: var(--surface-inverse); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .frame { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid rgba(194,154,68,.25); }
  .frame img { display: block; width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>
  <div class="row">
    <div class="frame"><img src="../assets/brand/mood-hall.png" alt="Marble-and-gold hall with evergreen banners and engraved stars"></div>
    <div class="frame"><img src="../assets/brand/mood-elements.png" alt="Flat-lay of engraved cards, badges, pills and seals in parchment, evergreen, gold and slate"></div>
  </div>
</body>
</html>
