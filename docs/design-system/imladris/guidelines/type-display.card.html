<!-- @dsCard group="Type" viewport="700x180" name="Cormorant Garamond — display" subtitle="Headings & wordmark; set medium (500), tight, balanced" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-raised); }
  .big { font-family: var(--font-display); font-weight: 500; font-size: 46px; line-height: 1.05; letter-spacing: -0.01em; color: var(--text-strong); margin: 0; }
  .sub { font-family: var(--font-display); font-style: italic; font-weight: 400; font-size: 20px; color: var(--ink-500); margin: 8px 0 0; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <p class="big">The Council Inbox</p>
  <p class="sub">Status is verified, not asserted.</p>
  <p class="meta">Cormorant Garamond · 400 / 500 / 600 · roman + italic</p>
</body>
</html>
