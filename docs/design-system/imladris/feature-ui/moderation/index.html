<script type="text/babel" data-presets="react">
const { useState } = React;
const DS = window.ImladrisDesignSystem_c3e027;
const { Button, Input } = DS;
const { Icons, Segmented, useTheme, Topbar, Lede, Spec, FrameBar } = window.FA;
const I = (name, s) => Icons[name](s);
const initials = (n) => n.split(/\s+/).map((w) => w[0]).slice(0, 2).join('').toUpperCase();

/* ════════ 01 · topic_workflow ════════ */
const MODS = ['Glorfindel', 'Erestor', 'Galadriel', 'Elrond (me)'];
const SNOOZES = [['tomorrow', 'Until tomorrow'], ['3d', 'In 3 days'], ['week', 'Next week']];
function TopicWorkflow() {
  const [menu, setMenu] = useState(null);
  const [assignee, setAssignee] = useState(null);
  const [snooze, setSnooze] = useState(null);
  const [escalated, setEscalated] = useState(false);
  const close = () => setMenu(null);
  const snoozeLabel = (s) => (SNOOZES.find((x) => x[0] === s) || [null, ''])[1].replace('Until ', '').replace('In ', '');

  return (
    <div className="frame" onClick={close}>
      <FrameBar route={<span><span className="seg-strong">Mod</span> / triage / Reading attention as a map, not a verdict</span>} />
      <div className="pane" onClick={(e) => e.stopPropagation()}>
        <p className="wf-crumb"># interpretability · opened by Arwen · 17 replies</p>
        <h3 className="wf-topic">Reading attention as a map, not a verdict</h3>

        <div className={'wf-bar' + (escalated ? ' escalated' : '')}>
          <span className="wf-bar-label">Workflow</span>

          <span className="wf-ctrl">
            <button className={'wf-btn' + (assignee ? ' set' : '')} onClick={() => setMenu(menu === 'assign' ? null : 'assign')}>
              {assignee ? <span className="wf-mono">{initials(assignee)}</span> : <span className="ic">{I('user', 14)}</span>}
              {assignee ? assignee.replace(' (me)', '') : 'Assign'}
              <span className="chev">{I('chevron', 12)}</span>
            </button>
            {menu === 'assign' && (
              <div className="wf-menu">
                <p className="wf-menu-label">Assign to</p>
                {MODS.map((m) => (
                  <button key={m} className="wf-opt" onClick={() => { setAssignee(m); close(); }}>
                    <span className="wf-mono">{initials(m)}</span>{m}
                    {assignee === m ? <span className="check">{I('check', 14)}</span> : null}
                  </button>
                ))}
                {assignee && <button className="wf-opt" onClick={() => { setAssignee(null); close(); }} style={{ color: 'var(--text-muted)' }}><span className="ic">{I('x', 14)}</span>Unassign</button>}
              </div>
            )}
          </span>

          <span className="wf-ctrl">
            <button className={'wf-btn' + (snooze ? ' set' : '')} onClick={() => setMenu(menu === 'snooze' ? null : 'snooze')}>
              <span className="ic">{I('clock', 14)}</span>{snooze ? 'Snoozed · ' + snoozeLabel(snooze) : 'Snooze'}
              <span className="chev">{I('chevron', 12)}</span>
            </button>
            {menu === 'snooze' && (
              <div className="wf-menu">
                <p className="wf-menu-label">Snooze until</p>
                {SNOOZES.map(([k, label]) => (
                  <button key={k} className="wf-opt" onClick={() => { setSnooze(k); close(); }}>
                    <span className="ic">{I('clock', 14)}</span>{label}
                    {snooze === k ? <span className="check">{I('check', 14)}</span> : null}
                  </button>
                ))}
                {snooze && <button className="wf-opt" onClick={() => { setSnooze(null); close(); }} style={{ color: 'var(--text-muted)' }}><span className="ic">{I('x', 14)}</span>Wake now</button>}
              </div>
            )}
          </span>

          <button className={'wf-btn danger' + (escalated ? ' set' : '')} onClick={() => setEscalated((e) => !e)}>
            <span className="ic">{I('escalate', 14)}</span>{escalated ? 'Escalated' : 'Escalate'}
          </button>

          <span className="wf-spacer" />
          <Button variant="ghost" size="sm" onClick={() => { setAssignee(null); setSnooze(null); setEscalated(false); }}>Reset</Button>
        </div>

        <ul className="triage">
          <li className={'triage-row' + (escalated ? ' hot' : ' open')}>
            <span className="triage-main">
              <span className="triage-title">Reading attention as a map, not a verdict</span>
              <span className="triage-meta">#interpretability · 17 replies · this topic</span>
            </span>
            <span className="triage-chips">
              {assignee ? <span className="wf-chip assigned"><span className="ic">{I('user', 11)}</span>{assignee.replace(' (me)', '')}</span> : null}
              {snooze ? <span className="wf-chip snoozed"><span className="ic">{I('clock', 11)}</span>{snoozeLabel(snooze)}</span> : null}
              {escalated ? <span className="wf-chip escalated"><span className="ic">{I('escalate', 11)}</span>Escalated</span> : null}
              {!assignee && !snooze && !escalated ? <span className="wf-chip">Untouched</span> : null}
            </span>
          </li>
          <li className="triage-row hot">
            <span className="triage-main">
              <span className="triage-title">Who changed what — prove the rollback?</span>
              <span className="triage-meta">#audit-trails · 41 replies</span>
            </span>
            <span className="triage-chips">
              <span className="wf-chip assigned"><span className="ic">{I('user', 11)}</span>Glorfindel</span>
              <span className="wf-chip escalated"><span className="ic">{I('escalate', 11)}</span>Escalated</span>
            </span>
          </li>
          <li className="triage-row">
            <span className="triage-main">
              <span className="triage-title">On exposing capability before we are asked</span>
              <span className="triage-meta">#capability-disclosure · 12 replies</span>
            </span>
            <span className="triage-chips">
              <span className="wf-chip snoozed"><span className="ic">{I('clock', 11)}</span>3 days</span>
            </span>
          </li>
        </ul>
      </div>
    </div>
  );
}

/* ════════ 02 · split_merge ════════ */
const POSTS = [
  { id: 1, author: 'Arwen', op: true, time: '1d', body: 'Attention tells you where the model looked, not what it concluded. I keep watching people read a verdict into a heatmap.' },
  { id: 2, author: 'Lindir', time: '20h', body: 'Is there a clean way to annotate a heatmap so the caveat travels with the image? That feels like a separate tooling question.' },
  { id: 3, author: 'Galadriel', time: '14h', body: 'It is separate — and worth its own topic. The map/verdict distinction is conceptual; the annotation tooling is practical.' },
  { id: 4, author: 'Lindir', time: '11h', body: 'Agreed. I can draft requirements for an annotation overlay if we spin it out.' },
];
const MERGE_TARGETS = [
  { id: 'evals', title: 'Evaluations as ritual, not gate', meta: '#evaluations · 23 replies' },
  { id: 'rollback', title: 'Who changed what — prove the rollback?', meta: '#audit-trails · 41 replies' },
  { id: 'tooling', title: 'Heatmap annotation tooling', meta: '#interpretability · 5 replies' },
];
function SplitMerge() {
  const [mode, setMode] = useState('split');
  const [picked, setPicked] = useState([2, 3, 4]);
  const [target, setTarget] = useState(null);
  const [pickOpen, setPickOpen] = useState(false);
  const toggle = (id) => setPicked((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);

  return (
    <div>
      <div className="demo-controls">
        <span className="demo-controls-label">Tool</span>
        <Segmented value={mode} onChange={setMode} options={[{ value: 'split', label: 'Split' }, { value: 'merge', label: 'Merge' }]} />
        <span className="demo-controls-spacer" />
        <span className="demo-hint">{mode === 'split' ? 'Tick replies to move into a new topic' : 'Choose a topic to merge this one into'}</span>
      </div>

      <div className="frame">
        <FrameBar route={<span><span className="seg-strong">Mod</span> / {mode === 'split' ? 'split topic' : 'merge topic'} / Reading attention as a map</span>} />
        <div className="pane">
          <div className="sm-grid">
            <div>
              <div className="sm-head">
                <h4>Reading attention as a map, not a verdict</h4>
                <span className="n">{POSTS.length} posts · #interpretability</span>
              </div>
              {POSTS.map((p) => {
                const on = picked.includes(p.id);
                return (
                  <div key={p.id} className={'sm-post' + (p.op ? ' op' : '') + (on ? ' picked' : '')}
                    onClick={() => !p.op && mode === 'split' && toggle(p.id)}>
                    {mode === 'split' && <span className="sm-check">{on ? I('check', 12) : null}</span>}
                    <span className="sm-post-main">
                      <span className="sm-post-by">
                        <span className="sm-post-author">{p.author}</span>
                        {p.op ? <span className="sm-post-op-tag">OP · stays</span> : null}
                        <span className="sm-post-time">{p.time}</span>
                      </span>
                      <span className="sm-post-body">{p.body}</span>
                    </span>
                  </div>
                );
              })}
            </div>

            {mode === 'split' ? (
              <div className="sm-panel">
                <p className="sm-panel-title"><span className="ic">{I('split', 17)}</span> Split into a new topic</p>
                <span className="sm-count-pill"><span className="sm-count-n">{picked.length}</span><span className="sm-count-label">{picked.length === 1 ? 'reply' : 'replies'} selected</span></span>
                <label className="sm-field-label">New topic title</label>
                <Input defaultValue="Heatmap annotation tooling" />
                <label className="sm-field-label">Board</label>
                <Input defaultValue="#interpretability" />
                <p className="sm-note">Selected replies move to the new topic; a link is left in place so the thread stays followable.</p>
                <div className="sm-panel-foot">
                  <Button variant="primary" className="btn-full" disabled={picked.length === 0}>
                    Split {picked.length} {picked.length === 1 ? 'reply' : 'replies'} out
                  </Button>
                </div>
              </div>
            ) : (
              <div className="sm-panel">
                <p className="sm-panel-title"><span className="ic">{I('merge', 17)}</span> Merge this topic</p>
                <div className="merge-from">
                  <span className="merge-from-label">From</span>
                  <span className="merge-from-title">Reading attention as a map…</span>
                  <span className="merge-from-meta">#interpretability · 4 posts</span>
                </div>
                <div className="merge-arrow">{I('chevron', 18)}</div>
                <div className={'merge-into' + (target ? ' chosen' : '')}>
                  <span className="merge-into-label">Into</span>
                  {target ? (
                    <div onClick={() => setPickOpen(true)} style={{ cursor: 'pointer' }}>
                      <span className="merge-from-title">{target.title}</span>
                      <span className="merge-from-meta">{target.meta}</span>
                    </div>
                  ) : (
                    <button className="merge-pick-btn" onClick={() => setPickOpen((o) => !o)}>
                      <span style={{ display: 'inline-flex', color: 'var(--gold-ink)' }}>{I('search', 15)}</span> Choose a topic…
                    </button>
                  )}
                  {pickOpen && (
                    <div className="merge-pick-list">
                      {MERGE_TARGETS.map((t) => (
                        <button key={t.id} className="merge-pick-item" onClick={() => { setTarget(t); setPickOpen(false); }}>
                          <span className="merge-pick-item-t">{t.title}</span>
                          <span className="merge-pick-item-m">{t.meta}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
                <p className="sm-note">All 4 posts move into the chosen topic; this one redirects there. The move is logged and reversible.</p>
                <div className="sm-panel-foot">
                  <Button variant="primary" className="btn-full" disabled={!target}>Merge topics</Button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════ Page ════════ */
function Page() {
  const [theme, setTheme] = useTheme();
  return (
    <div>
      <Topbar eyebrow="Feature activation · the warden's table"
        flags={[{ name: 'topic_workflow' }, { name: 'split_merge', blocked: true }]}
        theme={theme} setTheme={setTheme} />
      <div className="fa-doc">
        <Lede eyebrow="Built · awaiting a surface" title="The moderator's tools"
          ledger={[
            { flag: 'topic_workflow', desc: 'assign · snooze · escalate' },
            { flag: 'split_merge', desc: 'split & merge topics' },
          ]}>
          Two tools for the wardens. Both act on topics the backend can already move and tag — what they lack is the controls to do it by hand. Designed here in the warden's-table register: working surfaces, not ceremony.
        </Lede>

        <Spec num="01" label="topic_workflow" title="Assign, snooze, escalate"
          note="A workflow bar rides the top of any topic in triage. Assign it to a warden, snooze it out of the queue until a date, or escalate it — the bar turns to the danger rule and the topic surfaces hot. Each control writes the same state the queue below reads, so the table always agrees with itself.">
          <TopicWorkflow />
        </Spec>

        <Spec num="02" label="split_merge" title="Split a topic, or merge two"
          note="When one thread becomes two conversations, tick the replies that belong elsewhere and split them into a new topic — the OP stays put. When two threads are really one, merge this topic into another. Both leave a link behind and log the move.">
          <SplitMerge />
        </Spec>

        <div className="fa-callout" style={{ background: 'var(--surface-review)', borderLeftColor: 'var(--rule-gold)' }}>
          <span className="fa-callout-icon" style={{ color: 'var(--warning)' }}>{I('clock', 18)}</span>
          <p style={{ color: 'var(--on-review)' }}><b>topic_workflow</b> is near-ready — a browser/a11y capture from flipping. <b>split_merge</b> the audit places in the do-not-activate tier: it touches post ownership and counters and the build is reported incomplete, so the surface here runs ahead of the work.</p>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
