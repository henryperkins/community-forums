<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-raised); position: relative; overflow: hidden; }
  .watermark { position: absolute; top: -36px; right: -26px; width: 180px; height: 180px; color: var(--gold-500); opacity: .12; pointer-events: none; }
  .row { position: relative; display: flex; gap: 36px; align-items: center; }
  .cell { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); text-align: center; }
  .lbl b { display: block; color: var(--text); font-family: var(--font-label); text-transform: uppercase; letter-spacing: .06em; }
  .wordmark { display: inline-flex; align-items: center; gap: 11px; color: var(--brand); }
  .wordmark span { font-family: var(--font-display); font-weight: 500; font-size: 28px; color: var(--text-strong); }
  svg { display: block; }
</style>
</head>
<body>
  <svg class="watermark" viewBox="0 0 100 100" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"><path d="M50 3 63.8 16.7 83.2 16.8 83.3 36.2 97 50 83.3 63.8 83.2 83.2 63.8 83.3 50 97 36.2 83.3 16.8 83.2 16.7 63.8 3 50 16.7 36.2 16.8 16.8 36.2 16.7Z"/><path d="M50 21 57.5 42.5 79 50 57.5 57.5 50 79 42.5 57.5 21 50 42.5 42.5Z"/><circle cx="50" cy="50" r="5" fill="currentColor" stroke="none"/></g></svg>
  <div class="row">
    <div class="cell">
      <span class="wordmark"><svg width="34" height="34" viewBox="0 0 100 100" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"><path d="M50 3 63.8 16.7 83.2 16.8 83.3 36.2 97 50 83.3 63.8 83.2 83.2 63.8 83.3 50 97 36.2 83.3 16.8 83.2 16.7 63.8 3 50 16.7 36.2 16.8 16.8 36.2 16.7Z"/><path d="M50 21 57.5 42.5 79 50 57.5 57.5 50 79 42.5 57.5 21 50 42.5 42.5Z" opacity="0.5"/><circle cx="50" cy="50" r="5" fill="currentColor" stroke="none"/></g></svg><span>RetroBoards</span></span>
      <span class="lbl"><b>House mark</b>wordmark lockup</span>
    </div>
    <div class="cell">
      <svg width="40" height="40" viewBox="0 0 100 100" aria-hidden="true" style="color:var(--star)"><path fill="currentColor" d="M50 16 58.5 41.5 84 50 58.5 58.5 50 84 41.5 58.5 16 50 41.5 41.5Z"/></svg>
      <span class="lbl"><b>Commend star</b>esteem / reputation</span>
    </div>
  </div>
</body>
</html>
